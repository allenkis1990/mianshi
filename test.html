<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
<button id="btn">click</button>
<script src="./amr2.js"></script>
<script>

  const originalSend = XMLHttpRequest.prototype.send;
  XMLHttpRequest.prototype.send = function(body) {
    // 添加统一请求头（示例：dateTime时间戳）
    this.setRequestHeader('wahaha', 'lwh');
    // 调用原始send方法
    originalSend.apply(this, arguments);
  };

let amrPath = `https://resource.thedeer.cn/resource-testing/audio/db04b1971cc09f24ea8637e12aad177b9i4rznxczajw578p.amr`
let audio = null
document.getElementById('btn').addEventListener('click', function () {
  // 2. 加载 AMR 文件（支持 URL 或 Blob）
  if(!audio){
    // 1. 创建 BenzAMRRecorder 实例
    let amr = new BenzAMRRecorder();
    amr.initWithUrl(amrPath).then(()=>{
      audio = amr
      audio.play()
    })
  }else{
    audio.play()
  }
})
setTimeout(()=>{
  audio = null
},2000)
</script>
</body>


</html>
