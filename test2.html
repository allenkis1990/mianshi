    <style>
        .main{
            width: 200px;
            height: 200px;
            background: red;
            /*mask-image: linear-gradient(#000, #000),
            linear-gradient(#000, #000);
            mask-size: calc(100% - 30px) 100%,
            100% calc(100% - 30px);
            mask-position: left top, right top;
            mask-repeat: no-repeat;
            mask-composite: intersect;*/
            clip-path: polygon(
                    0 0,                          /* 1. 左上角 */
                    100% 0,                       /* 2. 右上角 */
                    100% calc(100% - 15px),       /* 3. 右侧边缘，距离底部15px（缺口上沿） */
                    calc(100% - 3px) calc(100% - 15px), /* 4. 缺口左上角（水平左移3px，垂直上移15px） */
                    calc(100% - 3px) 100%,        /* 5. 缺口左下角（水平左移3px，底部） */
                    0 100%                        /* 6. 左下角 */
            );
        }
    </style>
</head>
