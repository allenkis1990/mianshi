  function requestInterval(callback, interval) {
    let lastTime = new Date().getTime();
    function loop() {
      const now = new Date().getTime();
      if (now - lastTime >= interval) {
        callback();
        lastTime = now;
      }
      callback.timer = requestAnimationFrame(loop);
    }
    callback.timer = requestAnimationFrame(loop);
  }
  let count = 0
  // 使用示例
  let fn = () => {
    count ++
    console.log('每秒执行一次');
    if(count >= 3){
      console.log('干！！');
      count = 0
    }
  }
  requestInterval(fn, 1000);

  function clearTimer(){
    fn.timer && cancelAnimationFrame(fn.timer)
    fn.timer = null
  }

  setTimeout(()=>{
    clearTimer()
  },7000)
