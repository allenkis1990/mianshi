<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .keyboard-main{
            position: relative;
        }
        .keyboard-list{
            padding: 10px 5px 20px;
            background: #e4e9f1;
        }
        .keyboard-item-list{
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        .keyboard-item-list:last-child{
            margin-bottom: 0;
        }

        .keyboard-item{
            display: flex;
            flex: 1;
            height: 60px;
            line-height: 51px;
            overflow: hidden;
            font-size: 28px;
            color: #546474;
            position: relative;
            justify-content: center;

            /* 确保盒子模型一致 */
            box-sizing: border-box;
            /* 消除子元素间的布局缝隙 */
            align-items: stretch;
            gap: 0; /* 明确设置间隙为0 */
        }
        .key-text{
            width: 100%;
            height: 100%;
            position: absolute;
            left: 0;
            top: 0;
            text-align: center;
        }
        .key-bg-left, .key-bg-middle, .key-bg-right {
            /* 确保没有额外的边距或填充 */
            margin: 0;
            padding: 0;
            /* 消除可能的边界问题 */
            border: none;
            outline: none;
            /* 使用 transform 来微调位置 */
            backface-visibility: hidden; /* 激活硬件加速 */
            flex-shrink: 0; /* 防止压缩变形 */
            transform: translateZ(0); /* 防止渲染间隙 */
        }
        .key-bg-left{
            width: 16px;
            height: 100%;
            background: url("./key-bg-left.png") center center no-repeat;
            background-size: 16px 100%;
            position: absolute;
            left: 0;
            top: 0;
            z-index:2;
            clip-path: polygon(
                    0 0,                          /* 1. 左上角 */
                    100% 0,                       /* 2. 右上角 */
                    100% calc(100% - 8px),       /* 3. 右侧边缘，距离底部15px（缺口上沿） */
                    calc(100% - 3px) calc(100% - 8px), /* 4. 缺口左上角（水平左移3px，垂直上移15px） */
                    calc(100% - 3px) 100%,        /* 5. 缺口左下角（水平左移3px，底部） */
                    0 100%                        /* 6. 左下角 */
            );
        }
        .key-bg-middle{
            background: url("./key-bg-middle.png") center center no-repeat;
            background-size: 100% 100%;
            width: calc(100% - 26px);
            height: 100%;
            position: relative;
            z-index:1;
        }
        .key-bg-right{
            width: 16px;
            height: 100%;
            background: url("./key-bg-right.png") center center no-repeat;
            background-size: 16px 100%;
            position: absolute;
            right: 0;
            top: 0;
            z-index:2;
            clip-path: polygon(
                    0 0,                          /* 1. 左上角 */
                    100% 0,                       /* 2. 右上角 */
                    100% 100%,                    /* 3. 右下角 */
                    3px 100%,                     /* 4. 缺口右下角（水平右移3px，底部） */
                    3px calc(100% - 8px),        /* 5. 缺口右上角（水平右移3px，垂直上移15px） */
                    0 calc(100% - 8px)           /* 6. 左侧边缘，距离底部15px（缺口左上角） */
            );
        }
        .key-bg-left-mask{
            position: absolute;
            width: 3px;
            height: 8px;
            background: #f1ebeb;
            right: 0;
            bottom: 0;
        }
        .key-bg-right-mask{
            position: absolute;
            bottom: 0;
            left: 0;
            width: 3px;
            height: 8px;
            background-color: #ff0000; /* 替换成你想要的颜色 */
        }
    </style>
</head>
<body>
<div class="keyboard-main">
    <div class="keyboard-list">
        <div class="keyboard-item-list">

<!--                    <div class="key-bg-left-mask"></div>-->
                </div>

<!--                    <div class="key-bg-right-mask"></div>-->

                <div class="key-text">
                    A

            </div>
