<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        #main{width:300px;height:300px;background:red;}
    </style>
</head>
<body>
<div id="main"></div>
<button id="btn">click me</button>
<script>
    //自定义事件 可带上一个参数 一定要用detail包裹
    let eve = new CustomEvent('myEvent',{detail:{
        name:'allen'
    }})
    let main = document.getElementById('main')

    main.addEventListener('myEvent',function(e){
        console.log(e.detail,11);
    })



    document.getElementById('btn').addEventListener('click',function(){
      main.dispatchEvent(eve)
    })

</script>
</body>
</html>
