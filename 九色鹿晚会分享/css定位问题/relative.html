<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        *{margin:0;padding: 0;}
        .main{
            width: 1000px;
            height: 500px;
            margin:100px auto;
            border:1px solid red;
            display: flex;
            flex-wrap: wrap;
            align-content: baseline;
        }
        .box{
            width: 150px;
            height: 150px;
            background: green;
            margin-right: 10px;
            margin-bottom: 10px;
            display: inline-block;
        }
        .box-spec{
            background: deepskyblue;
            position: relative;
            top: 30px;
            left: 30px;
        }
    </style>
</head>
<body>
<div class="main">
    <div class="box"></div>
    <div class="box"></div>
    <div class="box box-spec"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
</div>
</body>
</html>
