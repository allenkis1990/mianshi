<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        *{margin:0;padding:0;box-sizing: border-box;}
        body,html{
            width: 100%;
            height: 100%;
        }
        .main{
            width: 100%;
            height: 100%;
            position: relative;
        }
        .box1{
            text-align: center;
            line-height: 100px;
            color:#fff;
            width: 100px;
            height: 100px;
            background: deepskyblue;
            position: relative;
            left: 100px;
            top:100px;
        }
        .box2{
            text-align: center;
            line-height: 100px;
            color:#fff;
            width: 100px;
            height: 100px;
            background: red;
            position: absolute;
            left: 100px;
            top:100px;
        }
        .box3{
            text-align: center;
            line-height: 100px;
            color:#fff;
            width: 100px;
            height: 100px;
            background: gray;
            position: fixed;
            left: 100px;
            top:100px;
        }
    </style>
</head>
<body>
<div class="main">
    <div class="box1">relative</div>
    <div class="box2">absolute</div>
</div>
<div class="box3">fixed</div>
</body>
</html>
