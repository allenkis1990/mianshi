<button id="btn">click</button>
<div class="result"></div>

<script>

  //总结：for let of可以遍历普通数组
  // 也可以遍历迭代器
  // 可以遍历异步的迭代器 需要for await

  /*let arr = ['hh',2,3]

  for(let item of arr){
    console.log(item,111);
  }*/


  function fn1(){
    return new Promise((resolve)=>{
      setTimeout(()=>{
        resolve(111)
      },3000)
    })
  }
  async function* gen() {
    yield await fn1();
    yield 22;
    yield 33;
  }

  let arr2 = gen()

  async function fn(){
    for await (let item of arr2){
      console.log(item);
    }
  }

  fn()
</script>
</html>
