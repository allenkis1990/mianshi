<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script src="rxjs.umd.min.js"></script>

<script type="module">
  let {Subject,operators} = rxjs
  let {map} = operators

  const observable = new Subject();


  setTimeout(()=>{
    observable.next(6)
  },3000)


  // 订阅这个 Observable
  const subscription = observable.pipe(
      //返回7 8 9 10
      map((num)=>{
        return num + 1
      })
  ).subscribe({
    next: (value) => console.log(value),
    error: (err) => console.error(err),
    complete: () => console.log('Completed')
  });

  console.log(map,123);
  console.log(rxjs);
</script>
</body>
</html>
