<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .main{
            position: relative;
            width: 480px;
            height: 360px;
            border: 1px solid red;
            margin: 20px auto;
            background-image:
            repeating-linear-gradient(to right, transparent 0, transparent 19px, rgba(208, 218, 229, 0.24) 19px, rgba(208, 218, 229, 0.24) 20px),
            repeating-linear-gradient(to right, transparent 0, transparent 99px, red 99px, red 100px),
            repeating-linear-gradient(to bottom, transparent 0, transparent 19px, rgba(208, 218, 229, 0.24) 19px, rgba(208, 218, 229, 0.24) 20px),
            repeating-linear-gradient(to bottom, transparent 0, transparent 99px, red 99px, red 100px);
            background-repeat: repeat;
            background-size: 100px 100px;
            background-position: -60px -20px;
            transform-origin: 0 0;
        }
        .vertical {
            position: absolute;
            top: 0;
            left: 50%;
            flex-direction: column;
            width: 2px;
            height: 100%;
            margin-left: -1px;
            white-space: nowrap;
            background-color: #000;
        }

        .horizontal {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            margin-top: -1px;
            white-space: nowrap;
            background-color: #000;
        }

        .vertical span {
            display: block;
            height: 100px;
            color: #666;
            font-size: 12px;
            text-shadow: 0 0 1px rgba(0, 0, 0, 0.8);
            -webkit-transform: translate(4px, 70px);
            transform: translate(4px, 70px);
        }

        .horizontal span {
            display: inline-block;
            width: 100px;
            color: #666;
            font-size: 12px;
            text-shadow: 0 0 1px rgba(0, 0, 0, 0.8);
            -webkit-transform: translate(42px, -2px);
            transform: translate(42px, -2px);
        }
    </style>
</head>
<body>
<div class="main" style="transform: translate(0px, 0px) scale(0.85);">
    <div class="vertical"><span>100</span><span></span><span>-100</span></div>
    <div class="horizontal"><span>-200</span><span>-100</span><span>0</span><span>100</span><span>200</span></div>
</div>
</body>
</html>
