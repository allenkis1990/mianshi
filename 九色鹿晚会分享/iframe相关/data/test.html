<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background: deepskyblue;
        }
        .iframe-ele{
            color: #ffffff;
            font-size: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

<script>
    setTimeout(()=>{
      let div = document.createElement('div')
      div.className = 'iframe-ele'
      let randomNum = Math.floor(Math.random() * 10) + 1;
      div.innerHTML = randomNum
      document.body.append(div)
    },3000)
</script>
</body>
</html>
