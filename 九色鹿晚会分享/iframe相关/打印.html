<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        *{
            padding: 0;margin: 0;box-sizing: border-box;
        }
        .box-inner{
            width: 600px;
            height: 400px;
            background: deepskyblue;
            color: #ffffff;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }
        .tit{
            font-size: 30px;
            font-weight: bold;
            text-align: center;
        }
        .content{
            font-size: 18px;
        }
        .footer{
            font-size: 18px;
            text-align: center;
            margin-top: auto;
        }
    </style>
</head>
<body>
<div id="box">
    <div class="box-inner">
        <div class="tit">哈哈哈</div>
        <div class="content">内容</div>
        <div class="footer">底部</div>
    </div>
</div>
<iframe id="printf" src="" width="0" height="0" frameborder="0"></iframe>
<button id="btn">打印</button>
<script>
    let btn = document.getElementById('btn')
    btn.addEventListener('click',function(){

      let newContent = document.querySelector("#box").innerHTML;
      let dom = document.getElementById("printf");
      dom.contentDocument.write(`<style  type="text/css" media="print">
      @page { size: landscape; }
        *{
            padding: 0;margin: 0;box-sizing: border-box;
        }
        .box-inner{
            width: 600px;
            height: 400px;
            background: deepskyblue;
            color: #ffffff;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }
        .tit{
            font-size: 30px;
            font-weight: bold;
            text-align: center;
        }
        .content{
            font-size: 18px;
        }
        .footer{
            font-size: 18px;
            text-align: center;
            margin-top: auto;
        }
        </style>`);
      dom.contentDocument.write(newContent);
      dom.contentDocument.close();
      dom.contentWindow.print.portrait = false;
      dom.contentWindow.print();

    })
</script>
</body>
</html>
