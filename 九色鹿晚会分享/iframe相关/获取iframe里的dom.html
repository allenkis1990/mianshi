<script>
    let timer = null
    function intervalGetDom(){
      timer = setInterval(()=>{
        try {
          let iframe = document.getElementById('iframe')
          let iframeWin = iframe.contentWindow
          let iframeDocument = iframeWin.document
          let iframeEle = iframeDocument.querySelector('.iframe-ele')
          if(iframeEle){
            console.log(iframeEle.innerHTML,'找到iframeEle的值');
            clearTimer()
          }
        }catch (e){
          console.error(e)
          clearTimer()
        }
      },500)
    }

    function clearTimer(){
      if(timer){
        clearInterval(timer)
        timer = null
      }
    }

    intervalGetDom()
</script>
