<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing: border-box}
        table{
            border-collapse: collapse;
            width: 600px;
            margin:50px auto;
        }
        td,th{
            border:1px solid red;
            text-align: center;
        }
    </style>
</head>
<body>

<table>
    <tr>
        <td rowspan="3">1</td>
        <td colspan="2">4</td>
    </tr>
    <tr>
        <td>1</td>
        <td>1</td>
    </tr>
    <tr>
        <td>1</td>
        <td>1</td>
    </tr>
</table>

<!--语义化-->
<table>
    <thead>
        <tr>
            <th>1</th>
            <th>1</th>
            <th>1</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>1</td>
            <td>1</td>
            <td>1</td>
        </tr>
    </tbody>
    <tfoot>
        <tr>
            <td>1</td>
            <td>1</td>
            <td>1</td>
        </tr>
    </tfoot>
</table>


<script>

</script>
</body>
</html>
