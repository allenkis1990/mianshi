<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .btn-box{
            width: 200px;
            height: 50px;
        }
    </style>
</head>
<body>
<div class="btn-box" id="btn-box"></div>
<script>
  let script = document.createElement('script')
  script.src = 'https://www.paypal.com/sdk/js?client-id=Ac22osxFpFaCEHbN_qRSrRAAexAoIYk8-qO6UUuwXucTNHFplckwAB9iyT-GyCf2kyAy6uVpNwYJVIpG'
  script.addEventListener('load',()=>{
    console.log(window.paypal);
    window.paypal.Buttons({
      style: {
        // layout: 'vertical',
        layout: 'horizontal',
        color: 'blue',
        shape: 'rect',
        label: 'paypal'
      },
      createOrder(data,actions){
        let orderId = actions.order.create({
          purchase_units:[
            {
              // description:'确定要买这个商品吗？',
              amount:{
                currency_code:'USD',value:'0.99'
              }
            }
          ]
        })
        console.log(orderId,'orderId');
        return orderId
      },
      onApprove(data,actions){
        return actions.order.capture().then((res)=>{
          console.log(res,'res');
          if(res.status === 'COMPLETED'){
            console.log('支付成功')
          }
        })
      },
      onCancel(){
        console.log('取消付款')
      },
      onClick(){
        console.log('点击付款按钮')
      }
    }).render('#btn-box');
  })
  document.body.appendChild(script)

</script>
</body>
</html>
