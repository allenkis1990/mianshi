</head>
<body>

            template:'<div><span>孩子：{{value2}}</span><button @click="fn">click</button></div>',
            props:{
                value2:'String'
            },
            model:{
                prop:'value2',
                event:'input2'
            },
            data:function(){
                return {

                }
            },
            methods:{
                fn:function(type){
                    this.$emit('input2',Math.random());
                }
            }

        });

        //局部注册组件
        var vm=new Vue({
            el:'#app',
            data:{
                a1:''
            },
            components:{

            },
            methods:{

            }
        });
    </script>
</body>
</html>
